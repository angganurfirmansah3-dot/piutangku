<script>
// ============ DATABASE SETUP ============
let db, SQL;
let currentUser = null;
let currentPage = 'login';
const IDB_NAME = 'PiutangKuDB';
const IDB_STORE = 'database';

// ============ UTILITY FUNCTIONS ============
const fmt = (n) => new Intl.NumberFormat('id-ID', {style: 'currency', currency: 'IDR', minimumFractionDigits: 0, maximumFractionDigits: 0}).format(Number(n) || 0);
const today = () => new Date().toISOString().split('T')[0];
const toast = (msg, type = 'info') => {
  const container = document.querySelector('.toast-container') || (() => {
    const div = document.createElement('div');
    div.className = 'toast-container';
    div.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:2000';
    document.body.appendChild(div);
    return div;
  })();
  const el = document.createElement('div');
  el.className = `alert alert-${type}`;
  el.style.cssText = 'margin:0;position:relative';
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 3000);
};

// ============ INDEXEDDB ============
async function initDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(IDB_NAME, 1);
    request.onerror = () => reject(request.error);
    request.onsuccess = () => resolve(request.result);
    request.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(IDB_STORE)) {
        db.createObjectStore(IDB_STORE);
      }
    };
  });
}

async function saveDB() {
  const idb = await initDB();
  return new Promise((resolve, reject) => {
    const tx = idb.transaction(IDB_STORE, 'readwrite');
    const request = tx.objectStore(IDB_STORE).put(db.export(), 'main');
    request.onerror = () => reject(request.error);
    request.onsuccess = () => resolve();
  });
}

async function loadDB() {
  const idb = await initDB();
  return new Promise((resolve, reject) => {
    const tx = idb.transaction(IDB_STORE, 'readonly');
    const request = tx.objectStore(IDB_STORE).get('main');
    request.onerror = () => reject(request.error);
    request.onsuccess = () => resolve(request.result);
  });
}

// ============ SCHEMA ============
function createSchema() {
  db.run(`
    CREATE TABLE IF NOT EXISTS users (
      id INTEGER PRIMARY KEY AUTOINCREMENT,
      name TEXT NOT NULL,
      email TEXT UNIQUE NOT NULL,
      password TEXT NOT NULL,
      role TEXT CHECK(role IN('admin','sales','finance','manager','owner')) DEFAULT 'sales',
      status TEXT DEFAULT 'active'
    );

    CREATE TABLE IF NOT EXISTS customers (
      id INTEGER PRIMARY KEY AUTOINCREMENT,
      name TEXT NOT NULL,
      phone TEXT,
      email TEXT,
      address TEXT,
      created_at TEXT DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS invoices (
      id INTEGER PRIMARY KEY AUTOINCREMENT,
      invoice_no TEXT UNIQUE NOT NULL,
      customer_id INTEGER NOT NULL,
      amount REAL NOT NULL,
      paid_amount REAL DEFAULT 0,
      remaining_amount REAL DEFAULT 0,
      due_date TEXT NOT NULL,
      status TEXT DEFAULT 'unpaid',
      created_at TEXT DEFAULT CURRENT_TIMESTAMP,
      FOREIGN KEY(customer_id) REFERENCES customers(id)
    );

    CREATE TABLE IF NOT EXISTS payments (
      id INTEGER PRIMARY KEY AUTOINCREMENT,
      invoice_id INTEGER NOT NULL,
      amount REAL NOT NULL,
      payment_date TEXT NOT NULL,
      method TEXT,
      notes TEXT,
      created_at TEXT DEFAULT CURRENT_TIMESTAMP,
      FOREIGN KEY(invoice_id) REFERENCES invoices(id)
    );

    CREATE TABLE IF NOT EXISTS reports (
      id INTEGER PRIMARY KEY AUTOINCREMENT,
      report_no TEXT UNIQUE NOT NULL,
      report_type TEXT,
      period_start TEXT,
      period_end TEXT,
      created_by INTEGER,
      created_at TEXT DEFAULT CURRENT_TIMESTAMP,
      FOREIGN KEY(created_by) REFERENCES users(id)
    );
  `);
}

// ============ QUERY FUNCTIONS ============
function getQuery(sql, params = []) {
  try {
    const result = db.exec(sql, params);
    if (result.length === 0) return [];
    const columns = result[0].columns;
    return result[0].values.map(row => {
      const obj = {};
      columns.forEach((col, i) => obj[col] = row[i]);
      return obj;
    });
  } catch (e) {
    console.error('Query error:', e);
    return [];
  }
}

function execSQL(sql, params = []) {
  try {
    db.run(sql, params);
    saveDB();
    return true;
  } catch (e) {
    console.error('Exec error:', e);
    return false;
  }
}

// ============ EXPORT/IMPORT CSV ============
function downloadCSV(data, filename) {
  if (!data || data.length === 0) {
    toast('Tidak ada data untuk diunduh', 'warning');
    return;
  }
  
  const headers = Object.keys(data[0]);
  const csv = [headers.join(','), ...data.map(row => headers.map(h => {
    const val = row[h];
    return typeof val === 'string' && val.includes(',') ? `"${val}"` : val;
  }).join(','))].join('\n');
  
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  const link = document.createElement('a');
  link.setAttribute('href', URL.createObjectURL(blob));
  link.setAttribute('download', filename);
  link.style.visibility = 'hidden';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  toast('File berhasil diunduh: ' + filename, 'success');
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).map(line => {
    const values = line.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
    const obj = {};
    headers.forEach((h, i) => obj[h] = values[i]);
    return obj;
  });
}

function uploadCustomersFromCSV(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = parseCSV(e.target.result);
      let count = 0;
      data.forEach(row => {
        if (row.name) {
          execSQL('INSERT INTO customers (name, email, phone, address) VALUES (?, ?, ?, ?)', 
            [row.name, row.email || '', row.phone || '', row.address || '']);
          count++;
        }
      });
      toast(`${count} pelanggan berhasil diimpor`, 'success');
      render();
    } catch (err) {
      toast('Error: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
}

function uploadInvoicesFromCSV(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = parseCSV(e.target.result);
      let count = 0;
      data.forEach(row => {
        if (row.invoice_no && row.customer_id && row.amount && row.due_date) {
          execSQL('INSERT INTO invoices (invoice_no, customer_id, amount, remaining_amount, due_date, status) VALUES (?, ?, ?, ?, ?, ?)',
            [row.invoice_no, parseInt(row.customer_id), parseFloat(row.amount), parseFloat(row.amount), row.due_date, row.status || 'unpaid']);
          count++;
        }
      });
      toast(`${count} faktur berhasil diimpor`, 'success');
      render();
    } catch (err) {
      toast('Error: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
}

function uploadPaymentsFromCSV(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = parseCSV(e.target.result);
      let count = 0;
      data.forEach(row => {
        if (row.invoice_id && row.amount && row.payment_date) {
          execSQL('INSERT INTO payments (invoice_id, amount, payment_date, method, notes) VALUES (?, ?, ?, ?, ?)',
            [parseInt(row.invoice_id), parseFloat(row.amount), row.payment_date, row.method || '', row.notes || '']);
          count++;
        }
      });
      toast(`${count} pembayaran berhasil diimpor`, 'success');
      render();
    } catch (err) {
      toast('Error: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
}

// ============ AUTH ============
function login(email, password) {
  if (!email || !password) {
    toast('Email dan password harus diisi', 'error');
    return false;
  }
  const users = getQuery('SELECT * FROM users WHERE email = ? AND password = ? AND status = ?', [email, password, 'active']);
  if (users.length === 0) {
    toast('Email atau password salah', 'error');
    return false;
  }
  currentUser = users[0];
  currentPage = 'dashboard';
  render();
  return true;
}

function logout() {
  currentUser = null;
  currentPage = 'login';
  render();
}

  `;
}

function renderDashboard() {
  const stats = getQuery(`
    SELECT 
      (SELECT COUNT(*) FROM customers) as total_customers,
      (SELECT COUNT(*) FROM invoices) as total_invoices,
      (SELECT COALESCE(SUM(amount), 0) FROM invoices) as total_amount,
      (SELECT COALESCE(SUM(remaining_amount), 0) FROM invoices) as remaining_amount,
      (SELECT COUNT(*) FROM invoices WHERE status='unpaid' AND due_date < date('now')) as overdue_count,
      (SELECT COALESCE(SUM(amount), 0) FROM payments) as paid_amount
  `)[0];

  const recentInvoices = getQuery(`
    SELECT i.*, c.name as customer_name 
    FROM invoices i 
    JOIN customers c ON i.customer_id = c.id 
    ORDER BY i.created_at DESC 
    LIMIT 5
  `);

  return `
    <div class="container">
      <h1 class="page-title">Dashboard</h1>
      
      <div class="stats-grid">
        <div class="stat-card primary">
          <h3>Total Piutang</h3>
          <div class="stat-value">${fmt(stats.total_amount)}</div>
        </div>
        <div class="stat-card">
          <h3>Sisa Piutang</h3>
          <div class="stat-value" style="color:#ef4444">${fmt(stats.remaining_amount)}</div>
        </div>
        <div class="stat-card">
          <h3>Total Pelanggan</h3>
          <div class="stat-value">${stats.total_customers}</div>
        </div>
        <div class="stat-card">
          <h3>Piutang Jatuh Tempo</h3>
          <div class="stat-value">${stats.overdue_count}</div>
        </div>
      </div>

      <div class="form-section">
        <h2>Transaksi Terbaru</h2>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Faktur</th>
                <th>Pelanggan</th>
                <th>Jumlah</th>
                <th>Jatuh Tempo</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              ${recentInvoices.map(inv => `
                <tr>
                  <td><strong>${inv.invoice_no}</strong></td>
                  <td>${inv.customer_name}</td>
                  <td>${fmt(inv.amount)}</td>
                  <td>${inv.due_date}</td>
                  <td><span class="badge ${inv.status === 'paid' ? 'badge-success' : inv.status === 'partial' ? 'badge-warning' : 'badge-danger'}">${inv.status.toUpperCase()}</span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

function renderExecutiveDashboard() {
  const stats = getQuery(`
    SELECT 
      (SELECT COALESCE(SUM(amount), 0) FROM invoices) as total_amount,
      (SELECT COALESCE(SUM(remaining_amount), 0) FROM invoices) as remaining_amount,
      (SELECT COALESCE(SUM(amount), 0) FROM payments) as paid_amount,
      (SELECT COUNT(*) FROM invoices WHERE status='unpaid' AND due_date < date('now')) as overdue_count,
      (SELECT COUNT(*) FROM customers) as total_customers
  `)[0];

  const topDebtors = getQuery(`
    SELECT c.name, SUM(i.remaining_amount) as total_remaining
    FROM invoices i
    JOIN customers c ON i.customer_id = c.id
    WHERE i.status != 'paid'
    GROUP BY c.id
    ORDER BY total_remaining DESC
    LIMIT 5
  `);

  return `
    <div class="container">
      <h1 class="page-title">Dashboard Eksekutif</h1>
      
      <div class="stats-grid">
        <div class="stat-card primary">
          <h3>Total Piutang</h3>

          <div class="stat-value" style="color:#ef4444">${fmt(stats.remaining_amount)}</div>
        </div>
        <div class="stat-card">
          <h3>Piutang Overdue</h3>
          <div class="stat-value">${stats.overdue_count}</div>

            <thead>
              <tr>

                <th>Total Tunggakan</th>
              </tr>

// ============ CRUD FUNCTIONS ============
function addUser() {
  const name = document.getElementById('userName')?.value || '';
  const email = document.getElementById('userEmail')?.value || '';
  const password = document.getElementById('userPassword')?.value || '';
  const role = document.getElementById('userRole')?.value || 'sales';

  if (!name || !email || !password) {
    toast('Semua field harus diisi', 'error');
    return;
  }

  if (execSQL('INSERT INTO users (name, email, password, role, status) VALUES (?, ?, ?, ?, ?)', [name, email, password, role, 'active'])) {
    toast('Pengguna berhasil ditambahkan', 'success');
    document.getElementById('userName').value = '';
    document.getElementById('userEmail').value = '';
    document.getElementById('userPassword').value = '';
    render();
  }
}

function deleteUser(id) {
  if (!confirm('Yakin ingin menghapus pengguna ini?')) return;
  if (execSQL('DELETE FROM users WHERE id = ?', [id])) {
    toast('Pengguna dihapus', 'success');
    render();
  }
}

function addCustomer() {

  const phone = document.getElementById('customerPhone')?.value || '';
  const address = document.getElementById('customerAddress')?.value || '';

}

function deleteCustomer(id) {

  if (execSQL('DELETE FROM customers WHERE id = ?', [id])) {
    toast('Pelanggan dihapus', 'success');
    render();
  }
}

function addInvoice() {
  const customerId = document.getElementById('invoiceCustomer')?.value || '';
  const invoiceNo = document.getElementById('invoiceNo')?.value || '';
  const amount = parseFloat(document.getElementById('invoiceAmount')?.value || 0);
  const dueDate = document.getElementById('invoiceDueDate')?.value || '';

  if (!customerId || !invoiceNo || amount <= 0 || !dueDate) {
    toast('Semua field harus diisi dengan benar', 'error');
    return;
  }

  if (execSQL('INSERT INTO invoices (customer_id, invoice_no, amount, remaining_amount, due_date, status) VALUES (?, ?, ?, ?, ?, ?)', 
    [customerId, invoiceNo, amount, amount, dueDate, 'unpaid'])) {
    toast('Faktur berhasil ditambahkan', 'success');
    document.getElementById('invoiceCustomer').value = '';
    document.getElementById('invoiceNo').value = '';
    document.getElementById('invoiceAmount').value = '';
    render();
  }
}

function deleteInvoice(id) {
  if (!confirm('Yakin ingin menghapus faktur ini?')) return;
  if (execSQL('DELETE FROM invoices WHERE id = ?', [id])) {
    toast('Faktur dihapus', 'success');
    render();
  }
}

function addPayment() {
  const invoiceId = document.getElementById('paymentInvoice')?.value || '';
  const amount = parseFloat(document.getElementById('paymentAmount')?.value || 0);
  const paymentDate = document.getElementById('paymentDate')?.value || '';
  const method = document.getElementById('paymentMethod')?.value || '';

  if (!invoiceId || amount <= 0 || !paymentDate) {
    toast('Semua field harus diisi dengan benar', 'error');
    return;
  }

  if (execSQL('INSERT INTO payments (invoice_id, amount, payment_date, method) VALUES (?, ?, ?, ?)', [invoiceId, amount, paymentDate, method])) {
    const invoice = getQuery('SELECT * FROM invoices WHERE id = ?', [invoiceId])[0];
    if (invoice) {
      const totalPaid = invoice.paid_amount + amount;
      let status = 'unpaid';
      if (totalPaid >= invoice.amount) {
        status = 'paid';
      } else if (totalPaid > 0) {
        status = 'partial';
      }
      execSQL('UPDATE invoices SET paid_amount = ?, remaining_amount = ?, status = ? WHERE id = ?', 
        [totalPaid, invoice.amount - totalPaid, status, invoiceId]);
    }
    toast('Pembayaran berhasil dicatat', 'success');
    document.getElementById('paymentInvoice').value = '';
    document.getElementById('paymentAmount').value = '';
    render();
  }
}

function generateReport() {
  toast('Laporan ditampilkan di bawah', 'success');
}

function changePassword() {
  const newPass = document.getElementById('newPassword')?.value || '';
  const confirmPass = document.getElementById('confirmPassword')?.value || '';

  if (!newPass) {
    toast('Password baru harus diisi', 'error');
    return;
  }

  if (newPass !== confirmPass) {
    toast('Password tidak cocok', 'error');
    return;
  }

  if (execSQL('UPDATE users SET password = ? WHERE id = ?', [newPass, currentUser.id])) {
    toast('Password berhasil diubah', 'success');
    currentUser.password = newPass;
    document.getElementById('newPassword').value = '';
    document.getElementById('confirmPassword').value = '';
  }
}

// ============ EXPORT FUNCTIONS ============
function exportCustomers() {
  const data = getQuery('SELECT id, name, email, phone, address, created_at FROM customers ORDER BY id DESC');
  downloadCSV(data, `pelanggan_${today()}.csv`);
}

function exportInvoices() {
  const data = getQuery('SELECT id, invoice_no, customer_id, amount, paid_amount, remaining_amount, due_date, status, created_at FROM invoices ORDER BY id DESC');
  downloadCSV(data, `piutang_${today()}.csv`);
}

function exportPayments() {
  const data = getQuery('SELECT id, invoice_id, amount, payment_date, method, created_at FROM payments ORDER BY id DESC');
  downloadCSV(data, `pembayaran_${today()}.csv`);
}

function exportAll() {
  const customers = getQuery('SELECT id, name, email, phone, address, created_at FROM customers');
  const invoices = getQuery('SELECT id, invoice_no, customer_id, amount, paid_amount, remaining_amount, due_date, status, created_at FROM invoices');
  const payments = getQuery('SELECT id, invoice_id, amount, payment_date, method, created_at FROM payments');
  
  const timestamp = today();
  downloadCSV(customers, `piutangku_pelanggan_${timestamp}.csv`);
  setTimeout(() => downloadCSV(invoices, `piutangku_piutang_${timestamp}.csv`), 500);
  setTimeout(() => downloadCSV(payments, `piutangku_pembayaran_${timestamp}.csv`), 1000);
}

// ============ IMPORT FUNCTIONS ============
function triggerFileUpload(type) {
  const input = document.getElementById('fileInput');
  input.dataset.type = type;
  input.click();
}

document.getElementById('fileInput')?.addEventListener('change', (e) => {
  const file = e.target.files[0];
  const type = e.target.dataset.type;
  if (!file) return;
  
  if (type === 'customers') uploadCustomersFromCSV(file);
  else if (type === 'invoices') uploadInvoicesFromCSV(file);
  else if (type === 'payments') uploadPaymentsFromCSV(file);
  
  e.target.value = '';
});

// ============ NAVIGATION ============
function goToPage(page) {
  currentPage = page;
  render();
}

function handleLogin() {
  const email = document.getElementById('loginEmail')?.value || '';
  const password = document.getElementById('loginPassword')?.value || '';
  login(email, password);
}

function updateInvoiceInfo() {
  const select = document.getElementById('paymentInvoice');
  if (select && select.selectedOptions[0]) {
    const amount = select.selectedOptions[0].getAttribute('data-amount');
    document.getElementById('paymentAmount').placeholder = `Maks: ${fmt(amount)}`;
  }
}

// ============ MAIN RENDER ============
function render() {
  const app = document.getElementById('app');
  app.innerHTML = !currentUser ? renderLogin() : renderApp();
}

// ============ BOOT ============
async function boot() {
  try {
    SQL = await initSqlJs({
      locateFile: file => `https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/${file}`
    });

    let savedDB = await loadDB();
    if (savedDB) {
      db = new SQL.Database(new Uint8Array(savedDB));
    } else {
      db = new SQL.Database();
      createSchema();
      seedData();
      await saveDB();
    }

    render();
  } catch (error) {
    console.error('Boot error:', error);
    document.getElementById('app').innerHTML = '<div style="padding:20px;color:red">Error: ' + error.message + '</div>';
  }
}

boot();
</script>
