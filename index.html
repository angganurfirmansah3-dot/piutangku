<script>
// ============ DATABASE SETUP ============
let db, SQL;

const IDB_NAME = 'PiutangKuDB';
const IDB_STORE = 'database';

// ============ UTILITY FUNCTIONS ============
const fmt = (n) => new Intl.NumberFormat('id-ID', {style: 'currency', currency: 'IDR', minimumFractionDigits: 0, maximumFractionDigits: 0}).format(Number(n) || 0);
const today = () => new Date().toISOString().split('T')[0];
const toast = (msg, type = 'info') => {
  const container = document.querySelector('.toast-container') || (() => {
    const div = document.createElement('div');
    div.className = 'toast-container';
    div.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:2000;max-width:90vw';
    document.body.appendChild(div);
    return div;
  })();
  const el = document.createElement('div');
  el.className = `alert alert-${type}`;
  el.style.cssText = 'margin:8px 0;position:relative;max-width:400px';
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 3000);
};

// ============ INDEXEDDB ============
async function initDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(IDB_NAME, 1);
    request.onerror = () => reject(request.error);
    request.onsuccess = () => resolve(request.result);
    request.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(IDB_STORE)) {
        db.createObjectStore(IDB_STORE);
      }
    };
  });
}

async function saveDB() {
  const idb = await initDB();
  return new Promise((resolve, reject) => {
    const tx = idb.transaction(IDB_STORE, 'readwrite');
    const request = tx.objectStore(IDB_STORE).put(db.export(), 'main');
    request.onerror = () => reject(request.error);
    request.onsuccess = () => resolve();
  });
}

async function loadDB() {
  const idb = await initDB();
  return new Promise((resolve, reject) => {
    const tx = idb.transaction(IDB_STORE, 'readonly');
    const request = tx.objectStore(IDB_STORE).get('main');
    request.onerror = () => reject(request.error);
    request.onsuccess = () => resolve(request.result);
  });
}

// ============ SCHEMA ============
function createSchema() {
  db.run(`
    CREATE TABLE IF NOT EXISTS users (
      id INTEGER PRIMARY KEY AUTOINCREMENT,
      name TEXT NOT NULL,
      email TEXT UNIQUE NOT NULL,
      password TEXT NOT NULL,
      role TEXT DEFAULT 'sales',
      status TEXT DEFAULT 'active'
    );

    CREATE TABLE IF NOT EXISTS customers (
      id INTEGER PRIMARY KEY AUTOINCREMENT,
      name TEXT NOT NULL,
      phone TEXT,
      email TEXT,
      address TEXT,
      created_at TEXT DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS invoices (
      id INTEGER PRIMARY KEY AUTOINCREMENT,
      invoice_no TEXT UNIQUE NOT NULL,
      customer_id INTEGER NOT NULL,
      amount REAL NOT NULL,
      paid_amount REAL DEFAULT 0,
      remaining_amount REAL DEFAULT 0,
      due_date TEXT NOT NULL,
      status TEXT DEFAULT 'unpaid',
      created_at TEXT DEFAULT CURRENT_TIMESTAMP,
      FOREIGN KEY(customer_id) REFERENCES customers(id)
    );

    CREATE TABLE IF NOT EXISTS payments (
      id INTEGER PRIMARY KEY AUTOINCREMENT,
      invoice_id INTEGER NOT NULL,
      amount REAL NOT NULL,
      payment_date TEXT NOT NULL,
      method TEXT,
      notes TEXT,
      created_at TEXT DEFAULT CURRENT_TIMESTAMP,
      FOREIGN KEY(invoice_id) REFERENCES invoices(id)
    );

    CREATE TABLE IF NOT EXISTS reports (
      id INTEGER PRIMARY KEY AUTOINCREMENT,
      report_no TEXT UNIQUE NOT NULL,
      report_type TEXT,
      period_start TEXT,
      period_end TEXT,
      created_by INTEGER,
      created_at TEXT DEFAULT CURRENT_TIMESTAMP,
      FOREIGN KEY(created_by) REFERENCES users(id)
    );
  `);
}

// ============ QUERY FUNCTIONS ============
function getQuery(sql, params = []) {
  try {
    const result = db.exec(sql, params);
    if (result.length === 0) return [];
    const columns = result[0].columns;
    return result[0].values.map(row => {
      const obj = {};
      columns.forEach((col, i) => obj[col] = row[i] || 0);
      return obj;
    });
  } catch (e) {
    console.error('Query error:', e);
    return [];
  }
}

function execSQL(sql, params = []) {
  try {
    db.run(sql, params);
    saveDB().catch(e => console.error('Save error:', e));
    return true;
  } catch (e) {
    console.error('Exec error:', e);
    return false;
  }
}

// ============ EXPORT/IMPORT CSV ============
function downloadCSV(data, filename) {
  if (!data || data.length === 0) {
    toast('Tidak ada data untuk diunduh', 'warning');
    return;
  }
  
  const headers = Object.keys(data[0]);
  const csvContent = [
    headers.join(','),
    ...data.map(row => 
      headers.map(h => {
        const val = row[h];
        if (typeof val === 'string' && (val.includes(',') || val.includes('"') || val.includes('\n'))) {
          return `"${val.replace(/"/g, '""')}"`;
        }
        return val;
      }).join(',')
    )
  ].join('\n');
  
  const blob = new Blob([csvContent], {type: 'text/csv;charset=utf-8;'});
  const link = document.createElement('a');
  link.setAttribute('href', URL.createObjectURL(blob));
  link.setAttribute('download', filename);
  link.style.visibility = 'hidden';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  toast('File berhasil diunduh: ' + filename, 'success');
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  
  const headerLine = lines[0];
  const headers = [];
  let currentField = '';
  let insideQuotes = false;
  
  for (let i = 0; i < headerLine.length; i++) {
    const char = headerLine[i];
    if (char === '"') {
      insideQuotes = !insideQuotes;
    } else if (char === ',' && !insideQuotes) {
      headers.push(currentField.trim().replace(/^"|"$/g, ''));
      currentField = '';
    } else {
      currentField += char;
    }
  }
  headers.push(currentField.trim().replace(/^"|"$/g, ''));
  
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i];
    const values = [];
    let currentValue = '';
    let insideQuotes = false;
    
    for (let j = 0; j < line.length; j++) {
      const char = line[j];
      if (char === '"') {
        insideQuotes = !insideQuotes;
      } else if (char === ',' && !insideQuotes) {
        values.push(currentValue.trim().replace(/^"|"$/g, ''));
        currentValue = '';
      } else {
        currentValue += char;
      }
    }
    values.push(currentValue.trim().replace(/^"|"$/g, ''));
    
    const obj = {};
    headers.forEach((h, i) => obj[h] = values[i] || '');
    if (Object.values(obj).some(v => v)) rows.push(obj);
  }
  
  return rows;
}

function uploadCustomersFromCSV(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = parseCSV(e.target.result);
      let count = 0;
      data.forEach(row => {
        if (row.name) {
          execSQL('INSERT INTO customers (name, email, phone, address) VALUES (?, ?, ?, ?)', 
            [row.name, row.email || '', row.phone || '', row.address || '']);
          count++;
        }
      });
      if (count > 0) {
        toast(`${count} pelanggan berhasil diimpor`, 'success');
        render();
      } else {
        toast('Tidak ada data yang valid untuk diimpor', 'warning');
      }
    } catch (err) {
      toast('Error: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
}

function uploadInvoicesFromCSV(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = parseCSV(e.target.result);
      let count = 0;
      data.forEach(row => {
        if (row.invoice_no && row.customer_id && row.amount && row.due_date) {
          execSQL('INSERT INTO invoices (invoice_no, customer_id, amount, remaining_amount, due_date, status) VALUES (?, ?, ?, ?, ?, ?)',
            [row.invoice_no, parseInt(row.customer_id), parseFloat(row.amount), parseFloat(row.amount), row.due_date, row.status || 'unpaid']);
          count++;
        }
      });
      if (count > 0) {
        toast(`${count} faktur berhasil diimpor`, 'success');
        render();
      } else {
        toast('Tidak ada data yang valid untuk diimpor', 'warning');
      }
    } catch (err) {
      toast('Error: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
}

function uploadPaymentsFromCSV(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = parseCSV(e.target.result);
      let count = 0;
      data.forEach(row => {
        if (row.invoice_id && row.amount && row.payment_date) {
          execSQL('INSERT INTO payments (invoice_id, amount, payment_date, method, notes) VALUES (?, ?, ?, ?, ?)',
            [parseInt(row.invoice_id), parseFloat(row.amount), row.payment_date, row.method || '', row.notes || '']);

        }
      });
      if (count > 0) {
        toast(`${count} pembayaran berhasil diimpor`, 'success');

      } else {
        toast('Tidak ada data yang valid untuk diimpor', 'warning');
      }
    } catch (err) {
      toast('Error: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
}

// ============ AUTH ============
function login(email, password) {
  if (!email || !password) {
    toast('Email dan password harus diisi', 'error');
    return false;
  }
  const users = getQuery('SELECT * FROM users WHERE email = ? AND password = ? AND status = ?', [email, password, 'active']);
  if (users.length === 0) {
    toast('Email atau password salah', 'error');
    return false;
  }
  currentUser = users[0];
  currentPage = 'dashboard';
  render();
  return true;
}

function logout() {
  currentUser = null;
  currentPage = 'login';
  render();
}

function handleLogin() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  login(email, password);
}

function goToPage(page) {
  currentPage = page;
  render();
}

function renderDashboard() {
  const stats = getQuery(`
    SELECT 
      (SELECT COUNT(*) FROM customers) as total_customers,
      (SELECT COUNT(*) FROM invoices) as total_invoices,
      (SELECT COALESCE(SUM(amount), 0) FROM invoices) as total_amount,
      (SELECT COALESCE(SUM(remaining_amount), 0) FROM invoices) as remaining_amount,
      (SELECT COUNT(*) FROM invoices WHERE status='unpaid' AND due_date < date('now')) as overdue_count,
      (SELECT COALESCE(SUM(amount), 0) FROM payments) as paid_amount
  `)[0];

  const recentInvoices = getQuery(`
    SELECT i.*, c.name as customer_name 
    FROM invoices i 
    JOIN customers c ON i.customer_id = c.id 
    ORDER BY i.created_at DESC 
    LIMIT 5

function renderExecutiveDashboard() {
  const stats = getQuery(`
    SELECT 
      (SELECT COALESCE(SUM(amount), 0) FROM invoices) as total_amount,
      (SELECT COALESCE(SUM(remaining_amount), 0) FROM invoices) as remaining_amount,
      (SELECT COALESCE(SUM(amount), 0) FROM payments) as paid_amount,
      (SELECT COUNT(*) FROM invoices WHERE status='unpaid' AND due_date < date('now')) as overdue_count,
      (SELECT COUNT(*) FROM customers) as total_customers
  `)[0];

  const topDebtors = getQuery(`
    SELECT c.name, SUM(i.remaining_amount) as total_remaining
    FROM invoices i
    JOIN customers c ON i.customer_id = c.id
    WHERE i.status != 'paid'
    GROUP BY c.id
    ORDER BY total_remaining DESC

// ============ CRUD FUNCTIONS ============
function addUser() {
  const name = document.getElementById('userName').value;
  const email = document.getElementById('userEmail').value;
  const password = document.getElementById('userPassword').value;
  const role = document.getElementById('userRole').value;

  if (!name || !email || !password) {
    toast('Semua field harus diisi', 'error');
    return;
  }

  if (execSQL('INSERT INTO users (name, email, password, role, status) VALUES (?, ?, ?, ?, ?)', [name, email, password, role, 'active'])) {
    toast('Pengguna berhasil ditambahkan', 'success');
    document.getElementById('userName').value = '';
    document.getElementById('userEmail').value = '';
    document.getElementById('userPassword').value = '';
    render();
  } else {
    toast('Gagal menambahkan pengguna', 'error');
  }
}

function deleteUser(id) {
  if (confirm('Apakah Anda yakin ingin menghapus pengguna ini?')) {
    execSQL('DELETE FROM users WHERE id = ?', [id]);
    render();
  }
}

function addCustomer() {
  const name = document.getElementById('customerName').value;
  const email = document.getElementById('customerEmail').value;
  const phone = document.getElementById('customerPhone').value;
  const address = document.getElementById('customerAddress').value;

  if (!name) {
    toast('Nama pelanggan harus diisi', 'error');
    return;
  }

  if (execSQL('INSERT INTO customers (name, email, phone, address) VALUES (?, ?, ?, ?)', [name, email, phone, address])) {
    toast('Pelanggan berhasil ditambahkan', 'success');
    document.getElementById('customerName').value = '';
    document.getElementById('customerEmail').value = '';
    document.getElementById('customerPhone').value = '';
    document.getElementById('customerAddress').value = '';
    render();
  } else {
    toast('Gagal menambahkan pelanggan', 'error');
  }
}

function deleteCustomer(id) {
  if (confirm('Apakah Anda yakin ingin menghapus pelanggan ini? Data terkait akan tetap ada.')) {
    execSQL('DELETE FROM customers WHERE id = ?', [id]);
    render();
  }
}

function addInvoice() {
  const customerId = document.getElementById('invoiceCustomer').value;
  const invoiceNo = document.getElementById('invoiceNo').value;
  const amount = document.getElementById('invoiceAmount').value;
  const dueDate = document.getElementById('invoiceDueDate').value;

  if (!customerId || !invoiceNo || !amount || !dueDate) {
    toast('Semua field harus diisi', 'error');
    return;
  }

  if (execSQL('INSERT INTO invoices (invoice_no, customer_id, amount, remaining_amount, due_date, status) VALUES (?, ?, ?, ?, ?, ?)', [invoiceNo, parseInt(customerId), parseFloat(amount), parseFloat(amount), dueDate, 'unpaid'])) {
    toast('Faktur berhasil ditambahkan', 'success');
    document.getElementById('invoiceCustomer').value = '';
    document.getElementById('invoiceNo').value = '';
    document.getElementById('invoiceAmount').value = '';
    render();
  } else {
    toast('Gagal menambahkan faktur', 'error');
  }
}

function deleteInvoice(id) {
  if (confirm('Apakah Anda yakin ingin menghapus faktur ini?')) {
    execSQL('DELETE FROM invoices WHERE id = ?', [id]);
    render();
  }
}

function addPayment() {
  const invoiceId = document.getElementById('paymentInvoice').value;
  const amount = document.getElementById('paymentAmount').value;
  const paymentDate = document.getElementById('paymentDate').value;
  const method = document.getElementById('paymentMethod').value;
  const notes = document.getElementById('paymentNotes').value;

  if (!invoiceId || !amount || !paymentDate) {
    toast('Semua field harus diisi', 'error');
    return;
  }

  const invoice = getQuery('SELECT * FROM invoices WHERE id = ?', [invoiceId])[0];
  if (!invoice) {
    toast('Faktur tidak ditemukan', 'error');
    return;
  }

  const newPaidAmount = invoice.paid_amount + parseFloat(amount);
  const newRemainingAmount = invoice.amount - newPaidAmount;
  const newStatus = newRemainingAmount === 0 ? 'paid' : newRemainingAmount < invoice.amount ? 'partial' : 'unpaid';

  if (execSQL('INSERT INTO payments (invoice_id, amount, payment_date, method, notes) VALUES (?, ?, ?, ?, ?)', [invoiceId, parseFloat(amount), paymentDate, method, notes])) {
    execSQL('UPDATE invoices SET paid_amount = ?, remaining_amount = ?, status = ? WHERE id = ?', [newPaidAmount, newRemainingAmount, newStatus, invoiceId]);
    toast('Pembayaran berhasil dicatat', 'success');
    document.getElementById('paymentInvoice').value = '';
    document.getElementById('paymentAmount').value = '';
    document.getElementById('paymentNotes').value = '';
    render();
  } else {
    toast('Gagal mencatat pembayaran', 'error');
  }
}

function deletePayment(id) {
  if (confirm('Apakah Anda yakin ingin menghapus pembayaran ini?')) {
    const payment = getQuery('SELECT * FROM payments WHERE id = ?', [id])[0];
    if (payment) {
      const invoice = getQuery('SELECT * FROM invoices WHERE id = ?', [payment.invoice_id])[0];
      if (invoice) {
        const newPaidAmount = invoice.paid_amount - payment.amount;
        const newRemainingAmount = invoice.amount - newPaidAmount;
        const newStatus = newRemainingAmount === 0 ? 'paid' : newRemainingAmount < invoice.amount ? 'partial' : 'unpaid';
        execSQL('UPDATE invoices SET paid_amount = ?, remaining_amount = ?, status = ? WHERE id = ?', [newPaidAmount, newRemainingAmount, newStatus, payment.invoice_id]);
      }
    }
    execSQL('DELETE FROM payments WHERE id = ?', [id]);
    render();
  }
}

// ============ MAIN RENDER FUNCTION ============
async function render() {
  const app = document.getElementById('app');
  if (currentPage === 'login') {
    app.innerHTML = renderLogin();
  } else if (currentUser) {
    app.innerHTML = renderApp();
  } else {
    app.innerHTML = renderLogin();
  }
}

// ============ INITIALIZE APP ============
async function initApp() {
  const sqlWasm = await SQL();
  db = new sqlWasm.Database();
  createSchema();
  seedData();
  render();
}

initApp().catch(e => {
  console.error('Init error:', e);
  document.getElementById('app').innerHTML = '<div style="padding:20px;color:red">Error: ' + e.message + '</div>';
});
</script>
